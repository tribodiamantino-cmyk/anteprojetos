<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login - Anteprojetos</title>
  <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body class="login-page">
  <main class="login-wrap">
    <form class="login-card" method="post" action="/login">
      <h1>Anteprojetos Agricolas</h1>
      <p>Acesse para montar e acompanhar anteprojetos.</p>
      {% if erro %}
      <div class="alert danger-alert">{{ erro }}</div>
      {% endif %}
      <label>Usuario
        <input name="usuario" autocomplete="username" required autofocus>
      </label>
      <label>Senha
        <input type="password" name="senha" autocomplete="current-password" required>
      </label>
      <button class="button primary" type="submit">Entrar</button>
    </form>
  </main>
</body>
</html>
